name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Test
        run: go test ./...
      - name: Check skill is up to date
        run: go run ./cmd/gen-skill --check
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -o gai-ghcli ./cmd/gai-ghcli
